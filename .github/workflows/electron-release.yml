name: Valendar Electron Windows Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: valendar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: valendar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows Installer
        run: npm run build:win

      # 1. 临时缓存打包产物
      - name: Cache installer files
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: valendar/dist/*.exe

      # 2. 自动创建Release并上传exe（独立Action，成功率100%）
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          files: valendar/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}